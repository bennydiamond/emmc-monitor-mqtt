version: "3.8"

services:
  emmc-monitor:
    image: ghcr.io/bennydiamond/emmc-monitor-mqtt/emmc-monitor:latest
    container_name: emmc-monitor
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      - MQTT_HOST=${MQTT_HOST}
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASS=${MQTT_PASS}
      - DEVICE_NAME=${DEVICE_NAME}
