name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get SCRIPT_VERSION
        id: get_version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(awk -F'"' '/SCRIPT_VERSION/ {print $2; exit}' monitor.py)"
          if [[ -z "${VERSION}" ]]; then
            echo "ERROR: Could not detect SCRIPT_VERSION in monitor.py" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # You can now easily add linux/amd64 here too if needed
          platforms: linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/emmc-monitor:${{ steps.get_version.outputs.version }}
            ghcr.io/${{ github.repository }}/emmc-monitor:latest
          build-args: |
            SCRIPT_VERSION=${{ steps.get_version.outputs.version }}
